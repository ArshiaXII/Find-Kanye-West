<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Kanye'yi Bul!</title>
    <style type="text/css">
        :root{
            --accent:#ffd33d;
            --bad:#ff4d4d;
            --good:#4dff88;
        }
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html, body{height:100%;margin:0;padding:0;overflow:hidden;
            font-family:'Trebuchet MS','Segoe UI',sans-serif;
            user-select:none;-webkit-user-select:none;
            touch-action:none;overscroll-behavior:none;}
        #playfield{
            position:fixed;inset:0;touch-action:none;
            background:url("beans.jpg") center/cover no-repeat;
            background-color:#111;
        }

        /* Hedefler */
        .kanye{
            position:absolute;cursor:pointer;width:60px;
            transition:filter .1s;
            filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));
            will-change:left,top;
        }
        .kanye.fake{filter:hue-rotate(150deg) saturate(2.5) drop-shadow(0 4px 6px rgba(0,0,0,.5));}
        .kanye:active{transform:scale(.85);}

        /* HUD */
        #hud{position:fixed;top:0;left:0;right:0;display:flex;gap:8px;
            justify-content:space-between;align-items:flex-start;
            padding:calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right))
                    8px calc(10px + env(safe-area-inset-left));
            pointer-events:none;z-index:10;flex-wrap:nowrap;}
        .panel{background:rgba(20,20,20,.78);color:#fff;border-radius:12px;
            padding:6px 10px;font-weight:bold;backdrop-filter:blur(3px);flex:1 1 0;
            min-width:0;box-shadow:0 4px 14px rgba(0,0,0,.4);text-align:center;line-height:1.15;}
        .panel small{display:block;font-size:clamp(9px,2.4vw,11px);opacity:.7;font-weight:normal;
            text-transform:uppercase;letter-spacing:1px;}
        .panel b{font-size:clamp(16px,5vw,22px);color:var(--accent);}
        #comboPanel b{color:var(--good);}

        /* Süre çubuğu */
        #timeBarWrap{position:fixed;left:0;right:0;bottom:0;
            height:calc(12px + env(safe-area-inset-bottom));
            padding-bottom:env(safe-area-inset-bottom);
            background:rgba(0,0,0,.4);z-index:10;}
        #timeBar{height:100%;width:100%;
            background:linear-gradient(90deg,var(--good),var(--accent),var(--bad));
            transition:width .1s linear;}

        /* Skor baloncukları */
        .pop{position:absolute;z-index:9;font-weight:bold;font-size:24px;
            pointer-events:none;text-shadow:0 2px 4px #000;
            animation:floatUp .8s ease-out forwards;}
        @keyframes floatUp{
            0%{opacity:1;transform:translateY(0) scale(1);}
            100%{opacity:0;transform:translateY(-60px) scale(1.4);}
        }

        /* Ekranlar */
        .overlay{position:fixed;inset:0;z-index:20;display:flex;
            flex-direction:column;align-items:center;justify-content:center;
            background:rgba(0,0,0,.7);color:#fff;text-align:center;padding:20px;}
        .overlay h1{font-size:clamp(34px,8vw,72px);margin:0 0 6px;
            color:var(--accent);text-shadow:0 4px 10px #000;}
        .overlay p{font-size:clamp(15px,3.5vw,20px);max-width:520px;
            line-height:1.5;margin:6px 0;}
        .btn{margin-top:22px;padding:16px 42px;font-size:22px;font-weight:bold;
            border:none;border-radius:50px;cursor:pointer;color:#1a1a1a;
            background:var(--accent);box-shadow:0 6px 0 #b8941f;transition:.08s;}
        .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b8941f;}
        .hidden{display:none;}
        .shake{animation:shake .3s;}
        @keyframes shake{
            0%,100%{transform:translate(0,0);}
            25%{transform:translate(-8px,4px);}
            50%{transform:translate(8px,-4px);}
            75%{transform:translate(-5px,-3px);}
        }
        .carnivalShake{animation:carnivalShakeAnim .18s ease-in-out infinite;}
        @keyframes carnivalShakeAnim{
            0%,100%{transform:translate(0,0);}
            20%{transform:translate(-5px,3px);}
            40%{transform:translate(5px,-3px);}
            60%{transform:translate(-3px,-4px);}
            80%{transform:translate(4px,2px);}
        }
        #finalStats b{color:var(--accent);}

        /* Instagram badge */
        #igBadge{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));
            right:calc(18px + env(safe-area-inset-right));
            z-index:25;display:flex;align-items:center;gap:8px;
            background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
            color:#fff;font-weight:bold;font-size:clamp(13px,3.5vw,16px);
            padding:10px 16px;border-radius:50px;
            box-shadow:0 4px 18px rgba(0,0,0,.45);
            text-decoration:none;letter-spacing:.3px;
            transition:transform .12s,box-shadow .12s;cursor:pointer;}
        #igBadge:active{transform:scale(.94);box-shadow:0 2px 8px rgba(0,0,0,.45);}
        #igBadge svg{flex-shrink:0;}

        /* Countdown intro overlay */
        #introScreen{position:fixed;inset:0;z-index:40;display:flex;
            flex-direction:column;align-items:center;justify-content:center;
            background:rgba(0,0,0,.88);color:#fff;pointer-events:none;}
        #introScreen.hidden{display:none;}
        #introTitle{font-size:clamp(38px,10vw,80px);font-weight:900;
            color:var(--accent);text-shadow:0 0 40px #ffd33d;
            letter-spacing:2px;margin-bottom:30px;
            animation:introPulse 1s ease-in-out infinite alternate;}
        @keyframes introPulse{from{transform:scale(1);}to{transform:scale(1.06);}}
        #introCount{font-size:clamp(72px,22vw,180px);font-weight:900;
            text-shadow:0 0 60px #fff,0 0 120px #ffd33d;
            line-height:1;min-height:1.1em;text-align:center;}

        /* Carnival mode */
        #playfield.carnival::after{
            content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
            border:5px solid transparent;
            animation:carnivalBorder 0.6s linear infinite;
        }
        @keyframes carnivalBorder{
            0%  {box-shadow:inset 0 0 40px rgba(255,60,0,.35);}
            50% {box-shadow:inset 0 0 70px rgba(255,180,0,.5);}
            100%{box-shadow:inset 0 0 40px rgba(255,60,0,.35);}
        }
        #modeLabel,#parisLabel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
            z-index:30;font-size:clamp(36px,10vw,72px);font-weight:900;text-align:center;
            color:#fff;text-shadow:0 0 30px #ff6a00,0 0 60px #ff6a00;
            pointer-events:none;transition:transform .15s;}
        #parisLabel{text-shadow:0 0 30px #2d9bff,0 0 60px #2d9bff;letter-spacing:2px;}
        #modeLabel.show,#parisLabel.show{transform:translate(-50%,-50%) scale(1);}
    </style>
</head>
<body>
    <div id="playfield"></div>
    <div id="modeLabel">🎪 CARNIVAL MODE</div>
    <div id="parisLabel">🗼 WHO IS IN PARIS</div>

    <div id="hud" class="hidden">
        <div class="panel"><small>Score</small><b id="score">0</b></div>
        <div class="panel" id="comboPanel"><small>Combo</small><b id="combo">x1</b></div>
        <div class="panel"><small>Level</small><b id="level">1</b></div>
        <div class="panel"><small>Best</small><b id="best">0</b></div>
    </div>
    <div id="timeBarWrap" class="hidden"><div id="timeBar"></div></div>

    <audio id="bgMusic"       src="YE - FATHER (feat. TRAVIS SCOTT).mp3" preload="auto"></audio>
    <audio id="carnivalMusic" src="$, Ye, Ty Dolla $ign - CARNIVAL ft. Playboi Carti &amp; Rich Da Kid.mp3" preload="auto"></audio>
    <audio id="parisMusic"    src="Video Project 9.m4a" preload="auto"></audio>

    <!-- Start screen -->
    <div id="startScreen" class="overlay">
        <h1>🕶️ Find Kanye</h1>
        <p>Click the real <b>Kanye</b> hiding in the beans as fast as you can.
           Build combos for bigger points!</p>
        <p>⚠️ Watch out: clicking <b style="color:var(--bad)">green fake Kanyes</b> costs you points and time.</p>
        <button class="btn" onclick="startGame()">PLAY ▶</button>
    </div>

    <!-- End screen -->
    <div id="endScreen" class="overlay hidden">
        <h1>Time's Up!</h1>
        <p id="finalStats"></p>
        <p id="newRecord" class="hidden" style="color:var(--good);font-weight:bold;">🏆 NEW RECORD! 🏆</p>
        <button class="btn" onclick="startGame()">PLAY AGAIN ↻</button>
    </div>

    <!-- Instagram badge (end screen köşesi) -->
    <a id="igBadge" class="hidden" href="https://www.instagram.com/arshia_riff/" target="_blank" rel="noopener">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4.5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/>
        </svg>
        @arshia_riff
    </a>

    <!-- Intro countdown -->
    <div id="introScreen" class="hidden">
        <div id="introTitle">🕶️ FIND KANYE</div>
        <div id="introCount">3</div>
    </div>

    <script>
    (function(){
        const field   = document.getElementById('playfield');
        const hud     = document.getElementById('hud');
        const timeWrap= document.getElementById('timeBarWrap');
        const timeBar = document.getElementById('timeBar');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const levelEl = document.getElementById('level');
        const bestEl  = document.getElementById('best');
        const startScreen = document.getElementById('startScreen');
        const endScreen   = document.getElementById('endScreen');
        const igBadge     = document.getElementById('igBadge');
        const introScreen = document.getElementById('introScreen');
        const introCount  = document.getElementById('introCount');
        const bgMusic      = document.getElementById('bgMusic');
        const carnivalMusic= document.getElementById('carnivalMusic');
        const parisMusic   = document.getElementById('parisMusic');
        const modeLabel    = document.getElementById('modeLabel');
        const parisLabel   = document.getElementById('parisLabel');
        bgMusic.volume     = 0.5;
        carnivalMusic.volume = 0.55;
        parisMusic.volume  = 0.5;

        // --- Carnival 13sn sonra 25sn titreme ---
        let cShakeT1 = null, cShakeT2 = null;
        function clearCarnivalShake(){
            if(cShakeT1){ clearTimeout(cShakeT1); cShakeT1=null; }
            if(cShakeT2){ clearTimeout(cShakeT2); cShakeT2=null; }
            field.classList.remove('carnivalShake');
        }
        carnivalMusic.addEventListener('play', ()=>{
            clearCarnivalShake();
            cShakeT1 = setTimeout(()=>{
                cShakeT1 = null;
                if(state && state.running) field.classList.add('carnivalShake');
                cShakeT2 = setTimeout(()=>{ cShakeT2=null; field.classList.remove('carnivalShake'); }, 25000);
            }, 13000);
        });
        carnivalMusic.addEventListener('pause', clearCarnivalShake);
        carnivalMusic.addEventListener('ended', ()=>{
            clearCarnivalShake();
            // Carnival modunda kaldıkça baştan çal (titreme yeniden 13sn sonra)
            if(state && state.running && state.carnivalMode){
                carnivalMusic.currentTime = 0;
                carnivalMusic.play().catch(()=>{});
            }
        });

        const START_TIME = 30;
        const MAX_TIME   = 30;
        const CARNIVAL_SCORE = 150;   // bu skoru geçince Carnival başlar
        let state = null;
        let best = parseInt(localStorage.getItem('kanyeBest') || '0', 10);
        bestEl.textContent = best;

        // --- Synth ses motoru ---
        let actx = null;
        function getCtx(){ return actx = actx || new (window.AudioContext||window.webkitAudioContext)(); }

        // Tek osillatör + gain
        function osc(freq, type, startVol, dur, delay=0){
            try{
                const ctx = getCtx();
                const t = ctx.currentTime + delay;
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.type = type; o.frequency.value = freq;
                o.connect(g); g.connect(ctx.destination);
                g.gain.setValueAtTime(startVol, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                o.start(t); o.stop(t + dur);
            }catch(e){}
        }

        // HIT sesi — Father: warm C-maj chord | Carnival: trap synth stab (Fm arpejio)
        function synthHit(combo){
            const carnival = state && state.carnivalMode;
            if(carnival){
                // Carnival: keskin sawtooth stab, Fm arpejio (F-Ab-C), hızlı
                [349, 415, 523].forEach((f,i) => osc(f * Math.min(1 + combo*0.04, 2), 'sawtooth', 0.18, 0.10, i*0.025));
                // Alt sub bass vuruşu
                osc(55, 'sine', 0.25, 0.15);
            } else {
                // Father: yumuşak C-maj chord (C-E-G), sine wave
                [261, 329, 392].forEach((f,i) => osc(f, 'sine', 0.14, 0.22, i*0.04));
            }
        }

        // MISS sesi — Father: alçak growl | Carnival: pitch-drop distorto
        function synthMiss(){
            const carnival = state && state.carnivalMode;
            if(carnival){
                // Carnival: yüksekten düşen sawtooth + sub thud
                try{
                    const ctx = getCtx();
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(400, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.35);
                    o.connect(g); g.connect(ctx.destination);
                    g.gain.setValueAtTime(0.22, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                    o.start(); o.stop(ctx.currentTime + 0.35);
                }catch(e){}
            } else {
                // Father: derin alçak growl
                try{
                    const ctx = getCtx();
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(110, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(55, ctx.currentTime + 0.28);
                    o.connect(g); g.connect(ctx.destination);
                    g.gain.setValueAtTime(0.18, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
                    o.start(); o.stop(ctx.currentTime + 0.28);
                }catch(e){}
            }
        }

        // LEVEL UP sesi — Father: yükselen G pentatonik | Carnival: agresif trap horn
        function synthLevelUp(){
            const carnival = state && state.carnivalMode;
            if(carnival){
                // Carnival: hızlı yükselen square arpejio + son notada vibrato
                [523,659,784,1047].forEach((f,i) => osc(f,'square',0.13,0.12,i*0.05));
                osc(1047,'sawtooth',0.10,0.18,0.20);
            } else {
                // Father: yumuşak yükselen G-B-D-G arpeji
                [392,494,587,784].forEach((f,i) => osc(f,'triangle',0.12,0.18,i*0.07));
            }
        }

        // OYUN BAŞLAMA sesi — dramatik 5 saniyelik build-up
        function synthStart(){
            // Alçak drone bass
            osc(65,'sine',0.18,5.0,0);
            osc(65,'sawtooth',0.06,5.0,0);
            // Yükselen arpejio dalgaları (0-2. sn)
            const rise=[130,164,196,261,329,392,523,659,784];
            rise.forEach((f,i)=>osc(f,'triangle',0.10,0.35,i*0.22));
            // 2. saniyede güçlü chord
            [261,329,392,523].forEach((f,i)=>osc(f,'square',0.09,1.2,2.0+i*0.05));
            // 4. saniyede final blast
            [523,659,784,1047].forEach((f,i)=>osc(f,'sawtooth',0.08,0.8,4.0+i*0.04));
            osc(65,'sine',0.22,0.6,4.5);
        }

        // Countdown sonrası oyunu gerçekten başlat
        function runCountdown(cb){
            introScreen.classList.remove('hidden');
            const steps=['3','2','1','GO!'];
            let i=0;
            function tick(){
                introCount.textContent=steps[i];
                i++;
                if(i<steps.length) setTimeout(tick,1000);
                else setTimeout(()=>{ introScreen.classList.add('hidden'); cb(); },800);
            }
            tick();
        }

        // OYUN BİTİŞ sesi
        function synthEnd(){
            [392,329,261,196].forEach((f,i) => osc(f,'sawtooth',0.14,0.20,i*0.08));
        }

        // --- Müzik çalma listesi (her oyunda rastgele sıra) ---
        const PARIS_MAX = 180; // Video Project 9: yalnızca ilk 3 dakika
        let parisTimeout = null;
        // Carnival listede değil; yalnızca skor eşiğinde (150) gelir
        const musicTracks = [
            { audio: bgMusic,    paris:false },
            { audio: parisMusic, paris:true  }
        ];
        let playlist = [], playlistPos = 0;

        function shuffle(a){
            for(let i=a.length-1;i>0;i--){
                const j=Math.floor(Math.random()*(i+1));
                [a[i],a[j]]=[a[j],a[i]];
            }
            return a;
        }
        function stopAllMusic(){
            if(parisTimeout){ clearTimeout(parisTimeout); parisTimeout=null; }
            parisLabel.classList.remove('show');
            clearCarnivalShake();
            musicTracks.forEach(t=>{ t.audio.pause(); });
            carnivalMusic.pause();
        }
        function startMusic(){
            stopAllMusic();
            playlist = shuffle(musicTracks.map((_,i)=>i));
            playlistPos = 0;
            playCurrentTrack();
        }
        function playCurrentTrack(){
            const track = musicTracks[playlist[playlistPos]];
            if(track.paris) startParisIntro(track);
            else { track.audio.currentTime=0; track.audio.play().catch(()=>{}); }
        }
        function advanceTrack(){
            playlistPos++;
            if(playlistPos>=playlist.length){ shuffle(playlist); playlistPos=0; }
            playCurrentTrack();
        }
        // Video Project 9 gelince: oyunu 1 sn dondur + "WHO IS IN PARIS" göster, sonra çal
        function startParisIntro(track){
            if(state) state.paused = true;
            parisLabel.classList.add('show');
            parisTimeout = setTimeout(()=>{
                parisTimeout = null;
                parisLabel.classList.remove('show');
                if(state) state.paused = false;
                lastTs = 0;
                track.audio.currentTime = 0;
                track.audio.play().catch(()=>{});
            }, 1000);
        }
        // Şarkı bitince sıradakine geç
        musicTracks.forEach(t=>{
            t.audio.addEventListener('ended', ()=>{ if(state && state.running) advanceTrack(); });
        });
        // Video Project 9 yalnızca ilk 3 dakika çalsın
        parisMusic.addEventListener('timeupdate', ()=>{
            if(parisMusic.currentTime >= PARIS_MAX){
                parisMusic.pause();
                if(state && state.running) advanceTrack();
            }
        });

        function rand(min,max){return Math.random()*(max-min)+min;}

        // --- Cihaza göre zorluk ölçeklemesi ---
        const isTouch = window.matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
        function fieldDiag(){return Math.hypot(field.clientWidth, field.clientHeight);}
        // Hız ekran köşegenine göre (px/saniye) -> her cihazda dengeli, telefonda daha hızlı
        function baseSpeed(){return fieldDiag() * (isTouch ? 0.19 : 0.14);}
        function startSize(){return isTouch ? 54 : 60;}
        function minSize(){return isTouch ? 26 : 34;}
        function startDecoys(){return isTouch ? 2 : 1;}
        // Oynanabilir alan: üstte HUD, altta süre çubuğu
        function bounds(){
            const top = (hud.offsetHeight || 56) + 6;
            return {w:field.clientWidth, h:field.clientHeight, top:top, bottom:18};
        }

        function makeKanye(fake){
            const img = document.createElement('img');
            img.src = 'head.png';
            img.className = 'kanye' + (fake?' fake':'');
            img.draggable = false;
            field.appendChild(img);
            const b = bounds();
            const size = state.size;
            const ang = rand(0, Math.PI*2);
            const e = {
                el:img, fake:!!fake, size:size,
                x:rand(0, Math.max(0, b.w - size)),
                y:rand(b.top, Math.max(b.top, b.h - size - b.bottom)),
                vx:Math.cos(ang)*state.speed, vy:Math.sin(ang)*state.speed
            };
            img.style.width = size+'px';
            img.addEventListener('pointerdown', ev=>{ev.preventDefault(); hit(e);});
            return e;
        }

        function popText(x,y,text,color){
            const p = document.createElement('div');
            p.className='pop'; p.textContent=text; p.style.color=color;
            p.style.left=x+'px'; p.style.top=y+'px';
            field.appendChild(p);
            setTimeout(()=>p.remove(),800);
        }

        function switchToCarnival(){
            state.carnivalMode = true;
            // Müzik: rastgele şarkıyı durdur, Carnival'a geç
            stopAllMusic();
            carnivalMusic.currentTime = 0;
            carnivalMusic.play().catch(()=>{});
            // Zorluk patlaması
            state.speed *= 1.5;
            state.size = Math.max(minSize(), state.size - 6);
            state.target.size = state.size;
            state.target.el.style.width = state.size+'px';
            // 3 ekstra sahte
            for(let i=0;i<3;i++) state.decoys.push(makeKanye(true));
            // Tüm mevcut sahteler hızlansın
            const ang = ()=>rand(0,Math.PI*2);
            [state.target,...state.decoys].forEach(e=>{
                const a=ang(); e.vx=Math.cos(a)*state.speed; e.vy=Math.sin(a)*state.speed;
            });
            // Görsel
            field.classList.add('carnival');
            modeLabel.classList.add('show');
            setTimeout(()=>modeLabel.classList.remove('show'), 2000);
            synthLevelUp();
        }

        function hit(e){
            if(!state.running) return;
            const cx = e.x + e.size/2, cy = e.y + e.size/2;
            if(e.fake){
                state.combo = 0;
                state.score = Math.max(0, state.score - 5);
                state.time  = Math.max(0, state.time - 3);
                synthMiss();
                popText(cx,cy,'-5  -3s',getCSS('--bad'));
                field.classList.remove('shake'); void field.offsetWidth;
                field.classList.add('shake');
            }else{
                state.combo++;
                const gained = 10 * state.combo;
                state.score += gained;
                state.time = Math.min(MAX_TIME, state.time + 1.2);
                state.found++;
                synthHit(state.combo);
                popText(cx,cy,'+'+gained,getCSS('--good'));
                respawn(e);
                if(state.found % 5 === 0) levelUp();
                // Carnival eşiği geçildi mi?
                if(!state.carnivalMode && state.score >= CARNIVAL_SCORE) switchToCarnival();
            }
            sync();
        }

        function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

        function respawn(e){
            const b = bounds();
            e.size = state.size;
            e.el.style.width = e.size+'px';
            e.x = rand(0, Math.max(0, b.w - e.size));
            e.y = rand(b.top, Math.max(b.top, b.h - e.size - b.bottom));
            const ang = rand(0, Math.PI*2);
            e.vx = Math.cos(ang)*state.speed;
            e.vy = Math.sin(ang)*state.speed;
        }

        function levelUp(){
            state.level++;
            state.speed *= 1.15;
            state.size = Math.max(minSize(), state.size - 3);
            // gerçek hedefi de hızlandır
            const ang = rand(0,Math.PI*2);
            state.target.vx = Math.cos(ang)*state.speed;
            state.target.vy = Math.sin(ang)*state.speed;
            state.target.size = state.size;
            state.target.el.style.width = state.size+'px';
            // yeni sahte ekle
            state.decoys.push(makeKanye(true));
            synthLevelUp();
            levelEl.textContent = state.level;
        }

        function sync(){
            scoreEl.textContent = state.score;
            comboEl.textContent = 'x'+state.combo;
            levelEl.textContent = state.level;
        }

        function moveEntity(e, dt, b){
            e.x += e.vx*dt; e.y += e.vy*dt;
            if(e.x <= 0){e.x=0; e.vx=Math.abs(e.vx);}
            if(e.x >= b.w-e.size){e.x=b.w-e.size; e.vx=-Math.abs(e.vx);}
            if(e.y <= b.top){e.y=b.top; e.vy=Math.abs(e.vy);}
            if(e.y >= b.h-e.size-b.bottom){e.y=b.h-e.size-b.bottom; e.vy=-Math.abs(e.vy);}
            e.el.style.left = e.x+'px';
            e.el.style.top  = e.y+'px';
        }

        let lastTs = 0;
        function loop(ts){
            if(!state || !state.running) return;
            // Paris girişi sırasında oyun dondurulur
            if(state.paused){ lastTs = ts; requestAnimationFrame(loop); return; }
            // dt'yi sınırla: sekme arka plandayken sıçramayı önler
            const dt = lastTs ? Math.min((ts-lastTs)/1000, 0.05) : 0;
            lastTs = ts;
            state.time -= dt;
            if(state.time <= 0){ state.time=0; endGame(); return; }
            timeBar.style.width = (state.time/MAX_TIME*100)+'%';

            const b = bounds();
            moveEntity(state.target, dt, b);
            state.decoys.forEach(d=>moveEntity(d, dt, b));
            requestAnimationFrame(loop);
        }

        function startGame(){
            field.innerHTML='';
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            igBadge.classList.add('hidden');
            hud.classList.remove('hidden');
            timeWrap.classList.remove('hidden');
            field.classList.remove('carnival');
            // Synth intro başlar, ardından countdown
            synthStart();
            runCountdown(()=>{
                state = {
                    score:0, combo:0, level:1, found:0,
                    time:START_TIME, speed:baseSpeed(), size:startSize(),
                    running:true, paused:false, carnivalMode:false, target:null, decoys:[]
                };
                state.target = makeKanye(false);
                for(let i=0;i<startDecoys();i++) state.decoys.push(makeKanye(true));
                sync();
                timeBar.style.width='100%';
                lastTs = 0;
                startMusic();
                requestAnimationFrame(loop);
            });
        }

        function endGame(){
            state.running = false;
            hud.classList.add('hidden');
            timeWrap.classList.add('hidden');
            stopAllMusic();
            field.classList.remove('carnival');
            igBadge.classList.remove('hidden');
            synthEnd();
            const isRecord = state.score > best;
            if(isRecord){ best = state.score; localStorage.setItem('kanyeBest', best); }
            bestEl.textContent = best;
            document.getElementById('finalStats').innerHTML =
                'Score: <b>'+state.score+'</b><br>'+
                'Level reached: <b>'+state.level+'</b> · Best: <b>'+best+'</b>';
            document.getElementById('newRecord').classList.toggle('hidden', !isRecord);
            endScreen.classList.remove('hidden');
        }

        // Ekran döndürme / boyut değişiminde hedefleri alan içine sıkıştır
        function clampAll(){
            if(!state || !state.running) return;
            const b = bounds();
            [state.target].concat(state.decoys).forEach(e=>{
                e.x = Math.min(Math.max(0, e.x), Math.max(0, b.w - e.size));
                e.y = Math.min(Math.max(b.top, e.y), Math.max(b.top, b.h - e.size - b.bottom));
                e.el.style.left = e.x+'px';
                e.el.style.top  = e.y+'px';
            });
        }
        window.addEventListener('resize', clampAll);
        window.addEventListener('orientationchange', ()=>setTimeout(clampAll, 300));

        // global'e aç (butonlar onclick kullanıyor)
        window.startGame = startGame;
    })();
    </script>
</body>
</html>
